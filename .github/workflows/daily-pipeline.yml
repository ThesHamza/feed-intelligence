name: Daily pipeline

on:
  schedule:
    - cron: '0 6 * * *'        # daily at 06:00 UTC
  workflow_dispatch:           # allow manual triggers

# Prevent overlapping runs
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write          # needed to commit & push updated data/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download fr_core_news_sm
          python -m spacy download es_core_news_sm

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          python -m pipeline.step_01_collect
          python -m pipeline.step_02_normalize
          python -m pipeline.step_03_extract
          python -m pipeline.step_04_quality
          python -m pipeline.step_05_classify
          python -m pipeline.step_07_prices
          python -m pipeline.step_06_export

      - name: Commit & push updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ site/data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily pipeline run $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
